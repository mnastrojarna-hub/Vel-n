<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGo24 — API Key Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #dff0ec; color: #0f1a14; min-height: 100vh; }

        /* Header */
        .header {
            background: #1a2e22;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(15,26,20,.25);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .header-subtitle {
            color: #74FB71;
            font-size: 13px;
            font-weight: 600;
            margin-left: 8px;
            opacity: .85;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Progress */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar-bg {
            width: 120px;
            height: 10px;
            background: rgba(255,255,255,.15);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #74FB71;
            border-radius: 8px;
            transition: width .4s ease;
        }
        .progress-text {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .progress-required {
            color: #74FB71;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .progress-required.warn { color: #fbbf24; }

        /* Security banner */
        .security-banner {
            background: linear-gradient(135deg, #1a2e22 0%, #234432 100%);
            color: #74FB71;
            text-align: center;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .3px;
        }
        .security-banner span { opacity: .9; }

        /* Main */
        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 0;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(15,26,20,.1);
            overflow: hidden;
            transition: box-shadow .2s;
        }
        .card:hover {
            box-shadow: 0 6px 28px rgba(15,26,20,.15);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            transition: background .15s;
        }
        .card-header:hover {
            background: #f8fcfa;
        }
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-icon {
            font-size: 20px;
            width: 32px;
            text-align: center;
        }
        .card-title {
            font-size: 15px;
            font-weight: 800;
            color: #1a2e22;
        }
        .card-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .card-badge.required {
            background: #dcfce7;
            color: #15803d;
        }
        .card-badge.optional {
            background: #f1f5f9;
            color: #64748b;
        }
        .card-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-link {
            font-size: 12px;
            color: #3dba3a;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            transition: background .15s;
        }
        .card-link:hover {
            background: #f0fdf4;
        }
        .card-chevron {
            font-size: 14px;
            color: #94a3b8;
            transition: transform .3s ease;
            font-weight: 700;
        }
        .card.open .card-chevron {
            transform: rotate(90deg);
        }
        .card-status {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
        }
        .card-status.complete {
            background: #dcfce7;
            color: #15803d;
        }
        .card-status.partial {
            background: #fef3c7;
            color: #92400e;
        }
        .card-status.empty {
            background: #f1f5f9;
            color: #94a3b8;
        }

        /* Card body */
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height .35s ease, padding .35s ease;
            padding: 0 20px;
        }
        .card.open .card-body {
            max-height: 800px;
            padding: 0 20px 20px;
        }

        /* Form field */
        .field {
            margin-bottom: 14px;
        }
        .field:last-child {
            margin-bottom: 0;
        }
        .field-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .field-name {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            font-family: 'Courier New', monospace;
            letter-spacing: .3px;
        }
        .field-required {
            color: #ef4444;
            font-weight: 800;
            margin-left: 4px;
        }
        .field-check {
            font-size: 13px;
            color: #22c55e;
            opacity: 0;
            transition: opacity .2s;
        }
        .field-check.visible { opacity: 1; }
        .field-row {
            display: flex;
            gap: 6px;
        }
        .field-warning {
            font-size: 11px;
            color: #f59e0b;
            font-weight: 600;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Inputs */
        input[type="text"],
        input[type="password"],
        input[type="url"],
        input[type="email"],
        input[type="number"] {
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid #d4e8e0;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
            background: #fff;
        }
        input:focus {
            border-color: #74FB71;
            box-shadow: 0 0 0 3px rgba(116,251,113,.15);
        }
        input.filled {
            border-color: #74FB71;
            background: #f0fdf4;
        }
        input.required-empty {
            border-color: #ef4444;
            background: #fef2f2;
        }

        /* Secret toggle button */
        .secret-toggle {
            width: 42px;
            min-width: 42px;
            height: 42px;
            border: 2px solid #d4e8e0;
            border-radius: 12px;
            background: #f1faf7;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s, background .2s;
            flex-shrink: 0;
        }
        .secret-toggle:hover {
            border-color: #74FB71;
            background: #f0fdf4;
        }

        /* Actions area */
        .actions-area {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(15,26,20,.1);
        }
        .actions-title {
            font-size: 15px;
            font-weight: 800;
            color: #1a2e22;
            margin-bottom: 16px;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #74FB71 0%, #3dba3a 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 16px rgba(116,251,113,.35);
            transition: transform .15s, box-shadow .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(116,251,113,.45);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-outline {
            background: transparent;
            color: #3dba3a;
            border: 2px solid #74FB71;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background .15s, transform .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-outline:hover {
            background: #f0fdf4;
            transform: translateY(-1px);
        }
        .btn-outline:active {
            transform: translateY(0);
        }
        .btn-full { grid-column: 1 / -1; }

        /* CLI output */
        .cli-output {
            display: none;
            margin-top: 16px;
            background: #1a2e22;
            border-radius: 14px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }
        .cli-output.visible { display: block; }
        .cli-output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .cli-output-title {
            color: #74FB71;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        .cli-copy-btn {
            background: rgba(116,251,113,.15);
            color: #74FB71;
            border: 1px solid rgba(116,251,113,.3);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background .15s;
        }
        .cli-copy-btn:hover {
            background: rgba(116,251,113,.25);
        }
        .cli-code {
            color: #d1fae5;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a2e22;
            color: #74FB71;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 8px 32px rgba(15,26,20,.3);
            z-index: 1000;
            opacity: 0;
            transition: transform .35s ease, opacity .35s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 12px;
                padding: 14px 16px;
            }
            .header-left { justify-content: center; }
            .header-right { justify-content: center; width: 100%; }
            .main { padding: 16px 10px 32px; }
            .actions-grid { grid-template-columns: 1fr; }
            .progress-bar-bg { width: 80px; }
            .header-subtitle { display: none; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="46" stroke="#13C14E" stroke-width="5"/>
            <path d="M22 72 L22 42 L50 20 L78 42 L78 72" stroke="#13C14E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L50 52" stroke="#13C14E" stroke-width="7" stroke-linecap="round"/>
            <path d="M35 72 Q50 56 65 72" stroke="#13C14E" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="header-title">MOTO GO 24</span>
        <span class="header-subtitle">API Key Manager</span>
    </div>
    <div class="header-right">
        <div class="progress-wrap">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span class="progress-text" id="progressText">0/0</span>

</div>

<!-- Security banner -->
<div class="security-banner">
    <span>&#128274; Vse bezi lokalne v prohlizeci. Zadna data se nikam neodesilaji.</span>
</div>

<!-- Main content -->
<div class="main" id="cardsContainer"></div>

<!-- Actions -->
<div class="main" style="padding-top:0;">
    <div class="actions-area">
        <div class="actions-title">Export a nasazeni</div>
        <div class="actions-grid">
            <button class="btn-primary btn-full" onclick="downloadEnv()">
                <span>&#128229;</span> Stahnout .env.local
            </button>
            <button class="btn-outline" onclick="copyConfigSnippet()">
                <span>&#128203;</span> Config snippet
            </button>
            <button class="btn-outline" onclick="toggleCLI()">
                <span>&#128187;</span> CLI prikazy
            </button>
        </div>
        <div class="cli-output" id="cliOutput">
            <div class="cli-output-header">
                <span class="cli-output-title">Supabase CLI &mdash; secrets set</span>
                <button class="cli-copy-btn" onclick="copyCLI()">Kopirovat</button>
            </div>
            <div class="cli-code" id="cliCode"></div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// MotoGo24 API Key Manager — Configuration
// ═══════════════════════════════════════════════════════

const SECTIONS = [
    {

    },

            { key: 'STRIPE_PUBLISHABLE_KEY', label: 'Publishable Key', type: 'text', placeholder: 'pk_test_...' }
        ]
    },
    {
        id: 'smtp',

            { key: 'SMTP_USER', label: 'SMTP User', type: 'email', placeholder: 'info@motogo24.cz' },
            { key: 'SMTP_PASS', label: 'SMTP Password', type: 'password', placeholder: 'App password', secret: true }
        ]

            { key: 'WHATSAPP_PHONE_ID', label: 'Phone Number ID', type: 'text', placeholder: '1234567890' }
        ]
    },

            { key: 'SMS_SENDER', label: 'Sender Name', type: 'text', placeholder: 'MotoGo24', defaultValue: 'MotoGo24' }
        ]

    },
    {

        linkText: 'Navod',
        fields: [
            { key: 'COMPANY_ICO', label: 'ICO', type: 'text', placeholder: '12345678' },
            { key: 'COMPANY_DIC', label: 'DIC', type: 'text', placeholder: 'CZ12345678' },
            { key: 'DATOVE_SCHRANKY_ID', label: 'Datova schranka ID', type: 'text', placeholder: 'abc1234' }
        ]
    },
    {
        id: 'app',

        title: 'Aplikace',
        badge: 'optional',
        badgeText: 'Config',
        link: null,
        linkText: null,
        fields: [
            { key: 'APP_URL', label: 'App URL', type: 'url', placeholder: 'https://motogo24.cz', defaultValue: 'https://motogo24.cz' },
            { key: 'ADMIN_URL', label: 'Admin URL', type: 'url', placeholder: 'https://admin.motogo24.cz', defaultValue: 'https://admin.motogo24.cz' },
            { key: 'ADMIN_PHONE', label: 'Admin telefon', type: 'text', placeholder: '+420774256271', defaultValue: '+420774256271' },
            { key: 'ADMIN_EMAIL', label: 'Admin email', type: 'email', placeholder: 'info@motogo24.cz', defaultValue: 'info@motogo24.cz' }
        ]

];

// Secret keys that should be set via Supabase CLI (not exposed to frontend)
const SECRET_KEYS = [
    'SUPABASE_SERVICE_ROLE_KEY',
    'ANTHROPIC_API_KEY',
    'STRIPE_SECRET_KEY',
    'STRIPE_WEBHOOK_SECRET',
    'SMTP_PASS',
    'WHATSAPP_TOKEN',
    'SMS_API_KEY',
    'GOOGLE_MAPS_API_KEY'
];

// ═══════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════

function render() {
    var container = document.getElementById('cardsContainer');
    var html = '';

    for (var s = 0; s < SECTIONS.length; s++) {
        var sec = SECTIONS[s];
        var isRequired = sec.badge === 'required';
        var openClass = s === 0 ? ' open' : '';

        html += '<div class="card' + openClass + '" id="card-' + sec.id + '">';
        html += '<div class="card-header" onclick="toggleCard(\'' + sec.id + '\')">';
        html += '<div class="card-header-left">';
        html += '<span class="card-icon">' + sec.icon + '</span>';
        html += '<span class="card-title">' + sec.title + '</span>';
        html += '<span class="card-badge ' + sec.badge + '">' + sec.badgeText + '</span>';
        html += '</div>';
        html += '<div class="card-header-right">';
        html += '<span class="card-status empty" id="status-' + sec.id + '"></span>';
        if (sec.link) {
            html += '<a class="card-link" href="' + sec.link + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#128214; ' + sec.linkText + '</a>';
        }
        html += '<span class="card-chevron">&#9656;</span>';
        html += '</div>';
        html += '</div>';

        html += '<div class="card-body">';
        for (var f = 0; f < sec.fields.length; f++) {
            var field = sec.fields[f];
            var inputType = field.secret ? 'password' : (field.type || 'text');
            var inputId = 'input-' + field.key;
            var defaultVal = field.defaultValue || '';

            html += '<div class="field">';
            html += '<div class="field-label">';
            html += '<span class="field-name">' + field.key;
            if (field.required) html += '<span class="field-required">*</span>';
            html += '</span>';
            html += '<span class="field-check" id="check-' + field.key + '">&#10003;</span>';
            html += '</div>';
            html += '<div class="field-row">';
            html += '<input type="' + inputType + '" id="' + inputId + '" placeholder="' + (field.placeholder || '') + '" value="' + defaultVal + '" data-key="' + field.key + '" data-required="' + (field.required ? '1' : '0') + '" data-section="' + sec.id + '" data-validate="' + (field.validate || '') + '" oninput="onFieldInput(this)" onkeydown="onFieldKeydown(event, this)">';
            if (field.secret) {
                html += '<button type="button" class="secret-toggle" onclick="toggleSecret(\'' + inputId + '\', this)" title="Zobrazit/skryt">&#128065;</button>';
            }
            html += '</div>';
            if (field.warning) {
                html += '<div class="field-warning">&#9888;&#65039; ' + field.warning + '</div>';
            }
            html += '</div>';
        }
        html += '</div>';
        html += '</div>';
    }

    container.innerHTML = html;
    updateProgress();
}

// ═══════════════════════════════════════════════════════
// Card toggle
// ═══════════════════════════════════════════════════════

function toggleCard(sectionId) {
    var card = document.getElementById('card-' + sectionId);
    card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// Secret toggle
// ═══════════════════════════════════════════════════════

function toggleSecret(inputId, btn) {
    var inp = document.getElementById(inputId);
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.innerHTML = '&#128064;';
    } else {
        inp.type = 'password';
        btn.innerHTML = '&#128065;';
    }
}

// ═══════════════════════════════════════════════════════
// Field input handler
// ═══════════════════════════════════════════════════════

function onFieldInput(el) {
    var key = el.getAttribute('data-key');
    var required = el.getAttribute('data-required') === '1';
    var validate = el.getAttribute('data-validate');
    var val = el.value.trim();

    // Remove classes
    el.classList.remove('filled', 'required-empty');

    if (val) {
        var valid = true;
        if (validate === 'supabase_url') {
            valid = val.indexOf('https://') === 0 && val.indexOf('.supabase.co') !== -1;
        }
        if (valid) {
            el.classList.add('filled');
            document.getElementById('check-' + key).classList.add('visible');
        } else {
            el.classList.add('required-empty');
            document.getElementById('check-' + key).classList.remove('visible');
        }
    } else {
        document.getElementById('check-' + key).classList.remove('visible');
        if (required) {
            el.classList.add('required-empty');
        }
    }

    updateProgress();
}

// ═══════════════════════════════════════════════════════
// Keyboard navigation
// ═══════════════════════════════════════════════════════

function onFieldKeydown(e, el) {
    if (e.key === 'Enter') {
        e.preventDefault();
        var inputs = Array.from(document.querySelectorAll('.field-row input'));
        var idx = inputs.indexOf(el);
        if (idx < inputs.length - 1) {
            inputs[idx + 1].focus();
        }
    }
    if (e.key === 'Escape' && el.type === 'text') {
        var key = el.getAttribute('data-key');
        var field = findField(key);
        if (field && field.secret) {
            el.type = 'password';
            var btn = el.parentElement.querySelector('.secret-toggle');
            if (btn) btn.innerHTML = '&#128065;';
        }
    }
}

function findField(key) {
    for (var s = 0; s < SECTIONS.length; s++) {
        for (var f = 0; f < SECTIONS[s].fields.length; f++) {
            if (SECTIONS[s].fields[f].key === key) return SECTIONS[s].fields[f];
        }
    }
    return null;
}

// ═══════════════════════════════════════════════════════
// Progress tracking
// ═══════════════════════════════════════════════════════

function updateProgress() {
    var allInputs = document.querySelectorAll('.field-row input');
    var totalFields = allInputs.length;
    var filledFields = 0;
    var requiredTotal = 0;
    var requiredFilled = 0;

    for (var i = 0; i < allInputs.length; i++) {
        var inp = allInputs[i];
        var val = inp.value.trim();
        var isRequired = inp.getAttribute('data-required') === '1';

        if (val) filledFields++;
        if (isRequired) {
            requiredTotal++;
            if (val) requiredFilled++;
        }
    }

    // Update progress bar
    var pct = totalFields > 0 ? Math.round((filledFields / totalFields) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = filledFields + '/' + totalFields;

    // Update required counter
    var reqEl = document.getElementById('progressRequired');
    if (requiredFilled === requiredTotal) {
        reqEl.textContent = requiredFilled + '/' + requiredTotal + ' povinne \u2705';
        reqEl.className = 'progress-required';
    } else {
        reqEl.textContent = requiredFilled + '/' + requiredTotal + ' povinne \u26a0\ufe0f';
        reqEl.className = 'progress-required warn';
    }

    // Update card statuses
    updateCardStatuses();
}

function updateCardStatuses() {
    for (var s = 0; s < SECTIONS.length; s++) {
        var sec = SECTIONS[s];
        var statusEl = document.getElementById('status-' + sec.id);
        var total = sec.fields.length;
        var filled = 0;

        for (var f = 0; f < sec.fields.length; f++) {
            var inp = document.getElementById('input-' + sec.fields[f].key);
            if (inp && inp.value.trim()) filled++;
        }

        if (filled === total) {
            statusEl.textContent = filled + '/' + total + ' \u2705';
            statusEl.className = 'card-status complete';
        } else if (filled > 0) {
            statusEl.textContent = filled + '/' + total;
            statusEl.className = 'card-status partial';
        } else {
            statusEl.textContent = '0/' + total;
            statusEl.className = 'card-status empty';
        }
    }
}

// ═══════════════════════════════════════════════════════
// Get all values
// ═══════════════════════════════════════════════════════

function getAllValues() {
    var values = {};
    for (var s = 0; s < SECTIONS.length; s++) {
        for (var f = 0; f < SECTIONS[s].fields.length; f++) {
            var key = SECTIONS[s].fields[f].key;
            var inp = document.getElementById('input-' + key);
            if (inp && inp.value.trim()) {
                values[key] = inp.value.trim();
            }
        }
    }
    return values;
}

// ═══════════════════════════════════════════════════════
// Download .env.local
// ═══════════════════════════════════════════════════════

function downloadEnv() {
    var values = getAllValues();
    var now = new Date();
    var dateStr = now.getDate() + '.' + (now.getMonth() + 1) + '.' + now.getFullYear() + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());

    var lines = [];
    lines.push('# ═══════════════════════════════════════');
    lines.push('# MotoGo24 — Environment Variables');
    lines.push('# Generovano: ' + dateStr);
    lines.push('# ═══════════════════════════════════════');
    lines.push('');

    for (var s = 0; s < SECTIONS.length; s++) {
        var sec = SECTIONS[s];
        var sectionLines = [];

        for (var f = 0; f < sec.fields.length; f++) {
            var key = sec.fields[f].key;
            if (values[key]) {
                sectionLines.push(key + '=' + values[key]);
            }
        }

        if (sectionLines.length > 0) {
            lines.push('# ' + sec.title.toUpperCase());
            for (var l = 0; l < sectionLines.length; l++) {
                lines.push(sectionLines[l]);
            }
            lines.push('');
        }
    }

    var content = lines.join('\n');
    var blob = new Blob([content], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '.env.local';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('\u2705 Stazeno: .env.local');
}

function pad(n) {
    return n < 10 ? '0' + n : '' + n;
}

// ═══════════════════════════════════════════════════════
// Config snippet (for frontend)
// ═══════════════════════════════════════════════════════

function copyConfigSnippet() {
    var values = getAllValues();
    var supaUrl = values['SUPABASE_URL'] || 'https://xxxxx.supabase.co';
    var anonKey = values['SUPABASE_ANON_KEY'] || 'eyJ...';

    var snippet = "window.MOTOGO_CONFIG = {\n";
    snippet += "    SUPABASE_URL: '" + supaUrl + "',\n";
    snippet += "    SUPABASE_ANON_KEY: '" + anonKey + "'\n";
    snippet += "};";

    copyToClipboard(snippet);
    showToast('\u2705 Zkopirovano! Vloz do frontend/index.html');
}

// ═══════════════════════════════════════════════════════
// CLI commands
// ═══════════════════════════════════════════════════════

function toggleCLI() {
    var el = document.getElementById('cliOutput');
    if (el.classList.contains('visible')) {
        el.classList.remove('visible');
        return;
    }

    var values = getAllValues();
    var lines = [];

    for (var i = 0; i < SECRET_KEYS.length; i++) {
        var key = SECRET_KEYS[i];
        if (values[key]) {
            lines.push('supabase secrets set ' + key + '="' + values[key] + '"');
        }
    }

    if (lines.length === 0) {
        lines.push('# Zadne secret klice k nastaveni.');
        lines.push('# Vyplnte pole vyse a znovu kliknete.');
    }

    document.getElementById('cliCode').textContent = lines.join('\n');
    el.classList.add('visible');
}

function copyCLI() {
    var code = document.getElementById('cliCode').textContent;
    copyToClipboard(code);
    showToast('\u2705 CLI prikazy zkopirovany!');
}

// ═══════════════════════════════════════════════════════
// Clipboard helper
// ═══════════════════════════════════════════════════════

function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
    } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }
}

// ═══════════════════════════════════════════════════════
// Toast notification
// ═══════════════════════════════════════════════════════

var toastTimeout = null;
function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function() {
        el.classList.remove('show');
    }, 2500);
}

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════

render();
</script>
