<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MotoGo Doklady</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ═══ MAIN SCREEN ═══ -->
    <div id="screen-main" class="screen">
      <div class="logo">Moto<span>Go24</span></div>
      <div class="subtitle">Skener dokladů</div>

      <button class="btn btn-primary" onclick="scanDocument('CAMERA')">📷 Vyfotit doklad</button>
      <button class="btn btn-secondary" onclick="scanDocument('PHOTOS')">🖼 Vybrat z galerie</button>

      <div class="history" id="history-section">
        <h3>Poslední odeslané</h3>
        <div id="history-list"></div>
      </div>
    </div>

    <!-- ═══ PREVIEW SCREEN ═══ -->
    <div id="screen-preview" class="screen" hidden>
      <img id="preview-img" alt="Náhled dokladu">

      <div id="error-box" class="error-box" hidden></div>

      <div class="preview-actions">
        <button class="btn btn-danger btn-small" onclick="resetToMain()">✗ Znovu</button>
        <button class="btn btn-primary btn-small" id="btn-send" onclick="sendDocument()">✓ Odeslat</button>
      </div>
    </div>

    <!-- ═══ RESULT SCREEN ═══ -->
    <div id="screen-result" class="screen" hidden>
      <div class="result-icon" id="result-icon"></div>
      <div class="result-message" id="result-message"></div>

      <div id="review-banner" class="review-banner" hidden></div>

      <div class="result-box">
        <h3>Detail dokladu</h3>
        <div class="result-row">
          <span class="result-label">Typ</span>
          <span class="result-value" id="result-type">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Dodavatel</span>
          <span class="result-value" id="result-supplier">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Částka</span>
          <span class="result-value" id="result-amount">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Datum</span>
          <span class="result-value" id="result-date">—</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="resetToMain()">📷 Další doklad</button>
    </div>

    <!-- ═══ LOADING OVERLAY ═══ -->
    <div id="loading-overlay" class="loading-overlay" hidden>
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">Analyzuji doklad…</div>
    </div>

  </div>

  <script src="https://unpkg.com/@aspect-build/aspect-ratio-polyfill"></script>
  <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
  <script src="app.js"></script>
</body>
</html>
