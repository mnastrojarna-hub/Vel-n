name: motogo_app
description: MotoGo24 — Motorcycle rental app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # i18n
  intl: ^0.19.0

  # Biometric auth
  local_auth: ^2.1.8

  # Network / connectivity
  connectivity_plus: ^5.0.2

  # URL launcher (Stripe checkout)
  url_launcher: ^6.2.2

  # Image picker (document scanning, SOS photos)
  image_picker: ^1.0.5

  # GPS
  geolocator: ^11.0.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Firebase messaging (push)
  firebase_messaging: ^14.7.6
  firebase_core: ^2.24.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
