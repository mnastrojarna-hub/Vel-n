workflows:
  motogo-android-debug:
    name: MotoGo24 Android Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: Motogo-app-main/motogo-app-flutter
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.pub-cache
    scripts:
      - name: Show environment
        script: |
          echo "Working dir: $(pwd)"
          echo "Flutter version:"
          flutter --version
          ls -la
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Accept Android licenses
        script: |
          yes | flutter doctor --android-licenses || true
      - name: Build APK (debug)
        script: |
          flutter build apk --debug
      - name: Generate QR for build page
        script: |
          brew install qrencode || true
          BUILD_URL="https://codemagic.io/app/${CM_PROJECT_ID}/build/${CM_BUILD_ID}"
          qrencode -t UTF8 "$BUILD_URL" || echo "QR generation failed"
          qrencode -o $CM_BUILD_DIR/qr_download.png -s 10 "$BUILD_URL" || echo "QR PNG failed"
          echo ""
          echo "========================================="
          echo "Build URL: $BUILD_URL"
          echo "APK v emailu a v artifacts této stránky."
          echo "========================================="
    artifacts:
      - Motogo-app-main/motogo-app-flutter/build/**/outputs/**/*.apk
      - qr_download.png
    publishing:
      email:
        recipients:
          - mnastrojarna@gmail.com
        notify:
          success: true
          failure: true
