workflows:
  motogo-android-debug:
    name: MotoGo24 Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: Motogo-app-main/motogo-app-flutter
    environment:
      flutter: stable
      java: 17
      groups:
        - supabase_upload
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Accept Android licenses
        script: |
          yes | flutter doctor --android-licenses || true
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (debug)
        script: |
          flutter build apk --debug
      - name: Upload APK to Supabase + generate QR
        script: |
          brew install qrencode
          APK_PATH=$(find build -name "app-debug.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"; exit 1
          fi
          TS=$(date +%Y%m%d-%H%M%S)
          OBJECT_PATH="builds/motogo24-debug-${TS}.apk"
          echo "Uploading $APK_PATH to Supabase Storage: $OBJECT_PATH"
          curl -sS -X POST "$SUPABASE_URL/storage/v1/object/media/$OBJECT_PATH" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@$APK_PATH" > /tmp/upload_result.json
          cat /tmp/upload_result.json
          DOWNLOAD_URL="$SUPABASE_URL/storage/v1/object/public/media/$OBJECT_PATH"
          echo "$DOWNLOAD_URL" > $CM_BUILD_DIR/download_url.txt
          qrencode -t UTF8 "$DOWNLOAD_URL"
          qrencode -o $CM_BUILD_DIR/qr_download.png -s 10 "$DOWNLOAD_URL"
          echo ""
          echo "========================================="
          echo "APK download: $DOWNLOAD_URL"
          echo "Scan QR above — link works without login."
          echo "========================================="
    artifacts:
      - Motogo-app-main/motogo-app-flutter/build/**/outputs/**/*.apk
      - qr_download.png
      - download_url.txt
    publishing:
      email:
        recipients:
          - mnastrojarna@gmail.com
        notify:
          success: true
          failure: true

  motogo-android-release:
    name: MotoGo24 Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: Motogo-app-main/motogo-app-flutter
    environment:
      flutter: stable
      java: 17
      groups:
        - android_signing
        - supabase_upload
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Accept Android licenses
        script: |
          yes | flutter doctor --android-licenses || true
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release
      - name: Build release AAB (Play Store)
        script: |
          flutter build appbundle --release
      - name: Upload APK to Supabase + generate QR
        script: |
          brew install qrencode
          APK_PATH=$(find build -name "app-release.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"; exit 1
          fi
          TS=$(date +%Y%m%d-%H%M%S)
          OBJECT_PATH="builds/motogo24-release-${TS}.apk"
          echo "Uploading $APK_PATH to Supabase Storage: $OBJECT_PATH"
          curl -sS -X POST "$SUPABASE_URL/storage/v1/object/media/$OBJECT_PATH" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@$APK_PATH" > /tmp/upload_result.json
          cat /tmp/upload_result.json
          DOWNLOAD_URL="$SUPABASE_URL/storage/v1/object/public/media/$OBJECT_PATH"
          echo "$DOWNLOAD_URL" > $CM_BUILD_DIR/download_url.txt
          qrencode -t UTF8 "$DOWNLOAD_URL"
          qrencode -o $CM_BUILD_DIR/qr_download.png -s 10 "$DOWNLOAD_URL"
          echo ""
          echo "========================================="
          echo "APK download: $DOWNLOAD_URL"
          echo "Scan QR above — link works without login."
          echo "========================================="
    artifacts:
      - Motogo-app-main/motogo-app-flutter/build/**/outputs/**/*.apk
      - Motogo-app-main/motogo-app-flutter/build/**/outputs/**/*.aab
      - qr_download.png
      - download_url.txt
    publishing:
      email:
        recipients:
          - mnastrojarna@gmail.com
        notify:
          success: true
          failure: true
